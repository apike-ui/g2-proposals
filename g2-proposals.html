      saving={saving}/>}

    {showLoad&&!historyTarget&&<LoadModal
      onClose={()=>setShowLoad(false)}
      onLoad={doLoad}
      onViewHistory={p=>{setHistoryTarget(p);}}/>}

    {historyTarget&&<HistoryModal
      proposal={historyTarget}
      onClose={()=>setHistoryTarget(null)}
      onLoadVersion={doLoadVersion}/>}
  </div>;
}

/* ================================================================
   PROPOSALS LIBRARY — searchable grid of all saved proposals
   ================================================================ */
function ProposalsLibrary({onEdit,onView,onNew,onEditRateCard,onNewRateCard,onLoadVersion}){
  const [proposals,setProposals]=useState([]);
  const [rateCards,setRateCards]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all"); // "all" | "proposals" | "ratecards"
  const [exporting,setExporting]=useState({});
  const [exportingGSLib,setExportingGSLib]=useState({});
  const [deleteConfirm,setDeleteConfirm]=useState(null);
  const [storageMode,setStorageMode]=useState("unknown");
  const [historyProp,setHistoryProp]=useState(null);

  useEffect(()=>{
    fetch("/api/storage-mode").then(r=>r.json()).then(d=>setStorageMode(d.mode)).catch(()=>{});
    Promise.all([
      api.listProposals().catch(()=>[]),
      fetch("/api/ratecards").then(r=>r.json()).then(d=>d.data||[]).catch(()=>[])
    ]).then(([p,rc])=>{setProposals(p);setRateCards(rc);setLoading(false);});
  },[]);

  const q=(search||"").toLowerCase();
  const filteredProposals=proposals.filter(p=>{
    if(!q)return true;
    return (p.customer||"").toLowerCase().includes(q)||(p.rep||"").toLowerCase().includes(q)||(p.name||"").toLowerCase().includes(q);
  });
  const filteredRateCards=rateCards.filter(rc=>{
    if(!q)return true;
    return (rc.customer||"").toLowerCase().includes(q)||(rc.owner||"").toLowerCase().includes(q)||(rc.name||"").toLowerCase().includes(q);
  });

  const totalPipeline=proposals.reduce((s,p)=>s+(p.grand_total||0),0);

  const relTime=iso=>{
    if(!iso)return"";
    const d=new Date(iso),now=new Date(),diff=(now-d)/1000;
    if(diff<60)return"just now";
    if(diff<3600)return Math.floor(diff/60)+"m ago";
    if(diff<86400)return Math.floor(diff/3600)+"h ago";
    if(diff<604800)return Math.floor(diff/86400)+"d ago";
    return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  };

  const accent=total=>total>=50000?C.rorange:total>=20000?C.purple:C.green;

  const doExportLib=async(p)=>{
    setExporting(prev=>({...prev,[p.id]:true}));
    try{
      const vers=await api.listVersions(p.id);
      if(!vers.length)throw new Error("No saved version — open and save the proposal first.");
      const v=await api.getVersion(vers[0].id);
      const r=await fetch("/api/proposals/export-pptx",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(v.snapshot)});
      if(!r.ok)throw new Error("Export failed ("+r.status+")");
      const blob=await r.blob(),url=URL.createObjectURL(blob),a=document.createElement("a");
      a.href=url;a.download=`G2_Proposal_${(p.customer||"Proposal").replace(/\s+/g,"_")}.pptx`;
      document.body.appendChild(a);a.click();
      setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
    }catch(e){alert("Export failed: "+e.message);}
    setExporting(prev=>({...prev,[p.id]:false}));
  };

  const doExportGSLib=async(p)=>{
    if(!GOOGLE_CLIENT_ID){alert("Google Slides export requires a Google OAuth Client ID.\n\nOpen any proposal → Preview tab → click \"Export to Google Slides\" for setup instructions.");return;}
    setExportingGSLib(prev=>({...prev,[p.id]:true}));
    try{
      const vers=await api.listVersions(p.id);
      if(!vers.length)throw new Error("No saved version — open and save the proposal first.");
      const v=await api.getVersion(vers[0].id);
      const pptxRes=await fetch("/api/proposals/export-pptx",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(v.snapshot)});
      if(!pptxRes.ok)throw new Error("PPTX generation failed");
      const pptxBlob=await pptxRes.blob();
      const token=await _getGoogleToken();
      const name=`G2 Proposal \u2014 ${p.customer||p.name||"Proposal"}`;
      const form=new FormData();
      form.append("metadata",new Blob([JSON.stringify({name,mimeType:"application/vnd.google-apps.presentation"})],{type:"application/json"}));
      form.append("file",pptxBlob);
      const upRes=await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,webViewLink",{method:"POST",headers:{Authorization:`Bearer ${token}`},body:form});
      if(!upRes.ok){const e=await upRes.json();throw new Error(e.error?.message||"Upload failed");}
      const{webViewLink}=await upRes.json();
      window.open(webViewLink,"_blank");
    }catch(e){if(e.message!=="popup_closed_by_user"&&e.message!=="access_denied")alert("Google Slides export failed:\n"+e.message);}
    setExportingGSLib(prev=>({...prev,[p.id]:false}));
  };

  return <div>
    {/* ── Header ── */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:16}}>
      <div>
        <h2 style={{fontSize:24,fontWeight:800,color:C.navy,marginBottom:4}}>Proposals + Rate Cards</h2>
        <p style={{fontSize:13,color:C.mid}}>
          {loading?"Loading...":`${proposals.length} proposal${proposals.length!==1?"s":""}  ·  ${rateCards.length} rate card${rateCards.length!==1?"s":""}  ·  ${fmt(totalPipeline)} pipeline`}
        </p>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button className="btn btn-pri" onClick={onNew} style={{display:"flex",alignItems:"center",gap:6,fontSize:13,padding:"9px 18px"}}>
          <span style={{fontSize:18,lineHeight:1}}>+</span> New Proposal
        </button>
        <button className="btn btn-sec" onClick={onNewRateCard} style={{display:"flex",alignItems:"center",gap:6,fontSize:13,padding:"9px 18px"}}>
          <span style={{fontSize:18,lineHeight:1}}>+</span> New Rate Card
        </button>
      </div>
    </div>

    {/* ── Storage Banner ── */}
    {storageMode==="sqlite"&&<div style={{background:"#FFF8E1",border:"1.5px solid #FFC800",borderRadius:8,padding:"12px 16px",marginBottom:20,display:"flex",alignItems:"flex-start",gap:10}}>
      <span style={{fontSize:18,lineHeight:1,flexShrink:0}}>{"\u26A0"}</span>
      <div style={{fontSize:12,color:"#062846",lineHeight:1.5}}>
        <strong>Storage Notice:</strong> Proposals are stored on the server's temporary filesystem. They may be cleared when the server redeploys or restarts. Export important proposals to PPTX or Google Slides to keep a permanent copy.
      </div>
    </div>}
    {storageMode==="supabase"&&<div style={{background:"#E0FAF6",border:"1.5px solid #27D3BC",borderRadius:8,padding:"10px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:10}}>
      <span style={{fontSize:15,lineHeight:1,color:"#27D3BC"}}>{"\u2713"}</span>
      <div style={{fontSize:12,color:"#062846"}}><strong>Cloud storage active</strong> — proposals are saved permanently and shared across all users.</div>
    </div>}

    {/* ── Filter + Search ── */}
    <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:20,flexWrap:"wrap"}}>
      <div style={{display:"flex",background:"#fff",borderRadius:6,border:"1px solid #E2E8F0",overflow:"hidden"}}>
        {[["all","All"],["proposals","Proposals"],["ratecards","Rate Cards"]].map(function(f){return <button key={f[0]} onClick={function(){setFilter(f[0]);}}
          style={{padding:"7px 14px",fontSize:12,fontWeight:filter===f[0]?700:500,border:"none",cursor:"pointer",
          background:filter===f[0]?C.navy:"#fff",color:filter===f[0]?"#fff":C.mid}}>{f[1]}</button>;})}
      </div>
      <div style={{position:"relative",flex:1,minWidth:200}}>
        <input type="text" className="inp" placeholder="Search by name, customer, rep, or owner..."
          value={search} onChange={e=>setSearch(e.target.value)}
          style={{width:"100%",fontSize:13,padding:"8px 14px 8px 14px"}}/>
      </div>
    </div>

    {/* ── Content ── */}
    {loading?(
      <div style={{textAlign:"center",padding:"80px 0",color:C.mid,fontSize:15}}>Loading...</div>
    ):(()=>{
      const showProposals=filter==="all"||filter==="proposals";
      const showRC=filter==="all"||filter==="ratecards";
      const hasProposals=showProposals&&filteredProposals.length>0;
      const hasRC=showRC&&filteredRateCards.length>0;
      if(!hasProposals&&!hasRC)return <div style={{textAlign:"center",padding:"80px 0"}}>
        <div style={{fontSize:20,fontWeight:700,color:C.navy,marginBottom:8}}>{q?"No results match your search":"Nothing saved yet"}</div>
        <p style={{fontSize:14,color:C.mid,marginBottom:28}}>{q?"Try a different search term":"Create a proposal or rate card to get started."}</p>
        {!q&&<div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button className="btn btn-pri" onClick={onNew}>New Proposal</button>
          <button className="btn btn-sec" onClick={onNewRateCard}>New Rate Card</button>
        </div>}
      </div>;
      return <div>
      {/* Rate Cards section */}
      {hasRC&&<div style={{marginBottom:hasProposals?28:0}}>
        {showProposals&&<div style={{fontSize:11,fontWeight:700,color:C.mid,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Rate Cards ({filteredRateCards.length})</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
          {filteredRateCards.map(rc=><div key={"rc-"+rc.id} className="card card-hover" onClick={function(){onEditRateCard(rc);}} style={{overflow:"hidden",cursor:"pointer"}}>
            <div style={{height:5,background:C.blue,flexShrink:0}}/>
            <div style={{padding:"16px 20px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:16,fontWeight:800,color:C.navy,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{rc.name||"Untitled"}</div>
                  {rc.customer&&<div style={{fontSize:12,color:C.blue,fontWeight:600,marginTop:2}}>{rc.customer}</div>}
                </div>
                <span className="pill" style={{background:C.blue,flexShrink:0}}>Rate Card</span>
              </div>
              {rc.owner&&<div style={{fontSize:11,color:C.mid,marginTop:6}}>Owner: {rc.owner}</div>}
              <div style={{fontSize:10,color:C.mid,marginTop:4}}>{rc.updated_at?new Date(rc.updated_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):""}</div>
            </div>
          </div>)}
        </div>
      </div>}
      {/* Proposals section */}
      {hasProposals&&<div>
      {showRC&&<div style={{fontSize:11,fontWeight:700,color:C.mid,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>Proposals ({filteredProposals.length})</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",gap:20}}>
        {filteredProposals.map(p=>{
          const ac=accent(p.grand_total||0);
          const isExp=exporting[p.id],isExpGS=exportingGSLib[p.id];
          return <div key={p.id} className="card card-hover" style={{overflow:"hidden",display:"flex",flexDirection:"column",transition:"transform .15s,box-shadow .15s"}}>
            {/* colour bar */}
            <div style={{height:5,background:ac,flexShrink:0}}/>
            {/* body */}
            <div style={{padding:"20px 22px 16px",flex:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,marginBottom:14}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:18,fontWeight:800,color:C.navy,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={p.customer||p.name}>
                    {p.customer||p.name||"Untitled Proposal"}
                  </div>
                  {p.name&&p.customer&&p.name!==p.customer&&
                    <div style={{fontSize:11,color:C.mid,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{fontSize:21,fontWeight:800,color:ac,lineHeight:1.1}}>{fmt(p.grand_total||0)}</div>
                  <div style={{fontSize:10,color:C.mid,fontWeight:600,letterSpacing:.5}}>ACV</div>
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>
                {p.rep&&<div style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:C.mid}}>
                  <span style={{width:14,textAlign:"center",flexShrink:0}}>👤</span><span>{p.rep}</span>
                </div>}
                <div style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:C.mid}}>
                  <span style={{width:14,textAlign:"center",flexShrink:0}}>🕐</span>
                  <span>Updated {relTime(p.updated_at)}</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:7,fontSize:12,color:C.mid}}>
                  <span style={{width:14,textAlign:"center",flexShrink:0}}>📌</span>
                  {(p.version_count||0)>0
                    ?<span onClick={function(e){e.stopPropagation();setHistoryProp(p);}} style={{cursor:"pointer",color:C.blue,textDecoration:"underline"}}>{p.version_count} version{p.version_count!==1?"s":""}</span>
                    :<span>No versions saved</span>}
                </div>
              </div>
            </div>
            {/* actions */}
            <div style={{padding:"12px 16px",borderTop:"1px solid #E2E8F0",background:"#FAFBFC",display:"flex",gap:7,alignItems:"center"}}>
              <button className="btn btn-sm btn-sec" style={{flex:"1 1 auto"}} onClick={()=>onEdit(p)}>Edit</button>
              <button className="btn btn-sm btn-out" style={{flex:"1 1 auto"}} onClick={()=>onView(p)}>Preview</button>
              <button title="Export PowerPoint" disabled={isExp} onClick={()=>doExportLib(p)}
                style={{background:isExp?"#eee":"#5746B2",color:isExp?"#999":"#fff",border:"none",borderRadius:5,padding:"6px 10px",fontSize:13,fontWeight:700,cursor:isExp?"default":"pointer",flexShrink:0}}>
                {isExp?"…":"⬇"}
              </button>
              <button title="Export to Google Slides" disabled={isExpGS} onClick={()=>doExportGSLib(p)}
                style={{background:isExpGS?"#eee":"#1a73e8",color:isExpGS?"#999":"#fff",border:"none",borderRadius:5,padding:"6px 9px",fontSize:12,fontWeight:700,cursor:isExpGS?"default":"pointer",flexShrink:0,display:"flex",alignItems:"center",gap:4}}>
                {isExpGS?"…":<>
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                    <path d="M6 2h9l5 5v15a1 1 0 01-1 1H5a1 1 0 01-1-1V3a1 1 0 011-1z" fill="#fff" opacity=".9"/>
                    <path d="M14 2l6 6h-5a1 1 0 01-1-1V2z" fill="#fff" opacity=".5"/>
                  </svg>
                  Slides
                </>}
              </button>
            </div>
          </div>;
        })}
      </div></div>}
      </div>;
    })()}

    {/* Version History Modal */}
    {historyProp&&<HistoryModal proposal={historyProp} onClose={()=>setHistoryProp(null)}
      onLoadVersion={(p,vid)=>{setHistoryProp(null);onLoadVersion(p,vid);}}/>}
  </div>;
}

/* ================================================================
   RATE CARD — named, per-customer with volume discounts
   ================================================================ */
function RateCardEditor({card,setCard,rcName,setRcName,rcCustomer,setRcCustomer,rcOwner,setRcOwner,onSave,saving,savedMsg,onBack}){
  const [expandedSku,setExpandedSku]=useState(null);

  const updateBasePkg=(id,price)=>{setCard(prev=>({...prev,basePkgs:{...prev.basePkgs,[id]:{...prev.basePkgs[id],price:pn(price)}}}));};
  const updateAddonTier=(addonId,tierIdx,field,val)=>{
    setCard(prev=>{const a={...prev.addons};const t=[...(a[addonId]?.tiers||[])];t[tierIdx]={...t[tierIdx],[field]:field==="label"||field==="excluded"?val:pn(val)};a[addonId]={...a[addonId],tiers:t};return{...prev,addons:a};});
  };
  const addVolDisc=(addonId)=>{setCard(prev=>{const a={...prev.addons};const vd=[...(a[addonId]?.volumeDisc||[]),{minProducts:2,discPct:5}];a[addonId]={...a[addonId],volumeDisc:vd};return{...prev,addons:a};});};
  const updateVolDisc=(addonId,idx,field,val)=>{setCard(prev=>{const a={...prev.addons};const vd=[...(a[addonId]?.volumeDisc||[])];vd[idx]={...vd[idx],[field]:pn(val)};a[addonId]={...a[addonId],volumeDisc:vd};return{...prev,addons:a};});};
  const removeVolDisc=(addonId,idx)=>{setCard(prev=>{const a={...prev.addons};const vd=[...(a[addonId]?.volumeDisc||[])];vd.splice(idx,1);a[addonId]={...a[addonId],volumeDisc:vd};return{...prev,addons:a};});};
  const updateNonAcv=(id,price)=>{setCard(prev=>({...prev,nonAcv:{...prev.nonAcv,[id]:{...prev.nonAcv[id],price:pn(price)}}}));};

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20,flexWrap:"wrap",gap:12}}>
      <button className="btn btn-out btn-sm" onClick={onBack} style={{fontSize:12}}>{"\u2190"} All Rate Cards</button>
      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        {savedMsg&&<span style={{fontSize:12,color:C.green,fontWeight:600}}>Saved!</span>}
        <button className="btn btn-sec" onClick={onSave} disabled={saving}>{saving?"Saving...":"Save Rate Card"}</button>
      </div>
    </div>

    {/* Card meta */}
    <div className="card" style={{padding:"16px 20px",marginBottom:20}}>
      <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-end"}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:10,fontWeight:600,color:C.mid,marginBottom:3}}>RATE CARD NAME</div>
          <input type="text" className="inp" value={rcName} onChange={e=>setRcName(e.target.value)} placeholder="e.g. Salesforce FY27" style={{width:"100%",fontSize:14,fontWeight:600}}/>
        </div>
        <div style={{minWidth:180}}>
          <div style={{fontSize:10,fontWeight:600,color:C.mid,marginBottom:3}}>CUSTOMER</div>
          <input type="text" className="inp" value={rcCustomer} onChange={e=>setRcCustomer(e.target.value)} placeholder="e.g. Salesforce" style={{width:200,fontSize:13}}/>
        </div>
        <div style={{minWidth:140}}>
          <div style={{fontSize:10,fontWeight:600,color:C.mid,marginBottom:3}}>OWNER</div>
          <input type="text" className="inp" value={rcOwner} onChange={e=>setRcOwner(e.target.value)} placeholder="Your name" style={{width:160,fontSize:13}}/>
        </div>
      </div>
    </div>

    {/* Base Packages */}
    <div className="card" style={{overflow:"hidden",marginBottom:20}}>
      <div style={{background:C.navy,padding:"10px 20px"}}><span style={{color:"#fff",fontWeight:700,fontSize:13}}>Base Packages</span></div>
      {BASE_PKGS.map(pkg=>{const myPrice=card.basePkgs[pkg.id]?.price;const diff=pkg.list>0&&myPrice!==pkg.list;
        return <div key={pkg.id} className="row" style={{gap:16,padding:"8px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:pkg.color}}/>
            <span style={{fontWeight:700,fontSize:13,color:C.navy}}>{pkg.name}</span>
          </div>
          <div style={{fontSize:11,color:C.mid}}>{pkg.list>0?fmt(pkg.list):"$0"}</div>
          <input type="number" className="inp inp-r" value={myPrice||""} placeholder={pkg.list||"0"} onChange={e=>updateBasePkg(pkg.id,e.target.value)} style={{width:100,fontSize:12}}/>
          {diff&&<div style={{fontSize:10,color:C.green,fontWeight:600,minWidth:50,textAlign:"right"}}>{calcDisc(myPrice,pkg.list)}%</div>}
        </div>;
      })}
    </div>

    {/* Add-Ons */}
    <div className="card" style={{overflow:"hidden",marginBottom:20}}>
      <div style={{background:C.navy,padding:"10px 20px"}}><span style={{color:"#fff",fontWeight:700,fontSize:13}}>Add-On Products</span></div>
      {ADDON_CATALOG.map(addon=>{const myAddon=card.addons[addon.id]||{tiers:[],volumeDisc:[]};const isOpen=expandedSku===addon.id;
        return <div key={addon.id} style={{borderBottom:"1px solid #F2F4F7"}}>
          <div className="row" style={{cursor:"pointer",background:isOpen?addon.tint:"#fff",padding:"10px 20px"}} onClick={()=>setExpandedSku(isOpen?null:addon.id)}>
            <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:addon.color}}/>
              <span style={{fontWeight:700,fontSize:13,color:C.navy}}>{addon.name}</span>
              <span style={{fontSize:11,color:C.mid}}>{myAddon.tiers.length} tiers</span>
              {myAddon.volumeDisc.length>0&&<span className="pill" style={{background:C.green,fontSize:9}}>{myAddon.volumeDisc.length} vol</span>}
            </div>
            <span style={{fontSize:14,color:C.mid,transform:isOpen?"rotate(180deg)":"none",transition:"transform .15s"}}>{"\u25BC"}</span>
          </div>
          {isOpen&&<div style={{padding:"10px 20px",background:addon.tint||"#F8FAFC"}}>
            <div style={{display:"grid",gridTemplateColumns:addon.catPricing?"0.4fr 3fr 1fr 0.8fr 1fr 0.6fr":"0.4fr 3fr 1fr 1fr 1fr",gap:4,marginBottom:2}}>
              <div style={{fontSize:9,fontWeight:600,color:C.mid,textAlign:"center"}}></div>
              <div style={{fontSize:9,fontWeight:600,color:C.mid}}>Tier</div>
              <div style={{fontSize:9,fontWeight:600,color:C.mid,textAlign:"right"}}>List</div>
              {addon.catPricing&&<div style={{fontSize:9,fontWeight:600,color:C.mid,textAlign:"center"}}>Categories</div>}
              <div style={{fontSize:9,fontWeight:600,color:C.mid,textAlign:"right"}}>My Rate</div>
              <div style={{fontSize:9,fontWeight:600,color:C.mid,textAlign:"right"}}>Disc</div>
            </div>
            {myAddon.tiers.map((tier,ti)=>{const disc=tier.listPrice>0&&tier.myPrice!==tier.listPrice&&!tier.excluded?calcDisc(tier.myPrice,tier.listPrice):0;
              return <div key={ti} style={{display:"grid",gridTemplateColumns:addon.catPricing?"0.4fr 3fr 1fr 0.8fr 1fr 0.6fr":"0.4fr 3fr 1fr 1fr 1fr",gap:4,padding:"3px 0",borderTop:"1px solid #E2E8F0",alignItems:"center",opacity:tier.excluded?0.4:1}}>
                <div style={{textAlign:"center"}}><input type="checkbox" checked={!tier.excluded} onChange={e=>updateAddonTier(addon.id,ti,"excluded",!e.target.checked)} title={tier.excluded?"Excluded — check to include":"Included — uncheck to exclude"} style={{margin:0}}/></div>
                <div style={{fontSize:11,color:tier.excluded?C.mid:C.navy,textDecoration:tier.excluded?"line-through":"none"}}>{tier.label}</div>
                <div style={{fontSize:11,color:C.mid,textAlign:"right"}}>{tier.listPrice>0?fmt(tier.listPrice):"Custom"}</div>
                {addon.catPricing&&<input type="number" className="inp" min="1" style={{width:"100%",textAlign:"center",fontSize:11,padding:"3px 4px"}} value={tier.catCount||""} placeholder="1"
                  onChange={e=>updateAddonTier(addon.id,ti,"catCount",e.target.value)} disabled={!!tier.excluded}/>}
                <input type="number" className="inp" style={{width:"100%",textAlign:"right",fontSize:11,padding:"3px 5px"}} value={tier.myPrice||""} placeholder={tier.listPrice||"0"} onChange={e=>updateAddonTier(addon.id,ti,"myPrice",e.target.value)} disabled={!!tier.excluded}/>
                {disc>0?<div style={{fontSize:10,color:C.green,fontWeight:600,textAlign:"right"}}>{disc}%</div>:<div/>}
              </div>;})}
            {addon.catPricing&&<div style={{marginTop:12,paddingTop:10,borderTop:"2px solid #E2E8F0"}}>
              <div style={{fontSize:9,fontWeight:700,color:C.mid,textTransform:"uppercase",marginBottom:6}}>Category Volume Pricing</div>
              <div style={{display:"flex",alignItems:"center",gap:12,padding:"6px 0",borderBottom:"1px solid #E2E8F0"}}>
                <span style={{fontSize:11,fontWeight:700,color:C.navy,minWidth:100}}>All Categories</span>
                <span style={{fontSize:11,color:C.mid}}>{fmt(addon.allCatPrice)}</span>
                <input type="number" className="inp" style={{width:90,textAlign:"right",fontSize:11,padding:"3px 5px"}} value={myAddon.allCatMyPrice||""} placeholder={addon.allCatPrice}
                  onChange={e=>{setCard(prev=>{const a={...prev.addons};a[addon.id]={...a[addon.id],allCatMyPrice:pn(e.target.value)};return{...prev,addons:a};});}}/>
              </div>
            </div>}
            <div style={{marginTop:12,paddingTop:10,borderTop:"2px solid #E2E8F0"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{fontSize:9,fontWeight:700,color:C.mid,textTransform:"uppercase"}}>Volume Discounts</div>
                <button className="btn btn-out btn-sm" onClick={()=>addVolDisc(addon.id)} style={{fontSize:10,padding:"2px 8px"}}>+ Add</button>
              </div>
              {myAddon.volumeDisc.length===0&&<div style={{fontSize:11,color:C.mid,fontStyle:"italic"}}>No volume discounts.</div>}
              {myAddon.volumeDisc.map((vd,vi)=><div key={vi} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",fontSize:11}}>
                <span style={{color:C.navy}}>On</span>
                <input type="number" className="inp" min="2" style={{width:40,textAlign:"center",fontSize:11,padding:"2px"}} value={vd.minProducts||""} onChange={e=>updateVolDisc(addon.id,vi,"minProducts",e.target.value)}/>
                <span style={{color:C.navy}}>+ products:</span>
                <input type="number" className="inp" min="0" max="100" style={{width:45,textAlign:"center",fontSize:11,padding:"2px"}} value={vd.discPct||""} onChange={e=>updateVolDisc(addon.id,vi,"discPct",e.target.value)}/>
                <span style={{color:C.navy}}>% off</span>
                <button onClick={()=>removeVolDisc(addon.id,vi)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#B0BACA",lineHeight:1}}>x</button>
              </div>)}
            </div>
          </div>}
        </div>;
      })}
    </div>

    {/* Non-ACV */}
    <div className="card" style={{overflow:"hidden",marginBottom:20}}>
      <div style={{background:C.mid,padding:"10px 20px"}}><span style={{color:"#fff",fontWeight:700,fontSize:13}}>Non-ACV Items</span></div>
      {NONAVC_CATALOG.map(item=>{const myPrice=card.nonAcv[item.id]?.price;
        return <div key={item.id} className="row" style={{gap:12,padding:"8px 20px"}}>
          <div style={{flex:1}}><span style={{fontWeight:600,fontSize:12,color:C.navy}}>{item.name}</span></div>
          <div style={{fontSize:11,color:C.mid}}>{item.list>0?fmt(item.list):"Var"}</div>
          <input type="number" className="inp inp-r" value={myPrice||""} placeholder={item.list||"0"} onChange={e=>updateNonAcv(item.id,e.target.value)} style={{width:90,fontSize:12}}/>
        </div>;
      })}
    </div>

    {/* Discount Rules */}
    <div className="card" style={{overflow:"hidden",marginBottom:20}}>
      <div style={{background:C.green,padding:"10px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{color:"#fff",fontWeight:700,fontSize:13}}>Discount Rules</span>
        <button className="btn btn-sm" style={{background:"rgba(255,255,255,.2)",color:"#fff",border:"none",fontSize:11}} onClick={()=>{
          setCard(prev=>({...prev,discountRules:[...(prev.discountRules||[]),{id:Date.now(),name:"",discPct:"",termMonths:"any",skus:[]}]}));
        }}>+ Add Rule</button>
      </div>
      {(!card.discountRules||card.discountRules.length===0)&&<div style={{padding:"20px",textAlign:"center",fontSize:12,color:C.mid}}>
        No discount rules. Add a rule to automatically apply discounts based on term length and selected SKUs.
      </div>}
      {(card.discountRules||[]).map((rule,ri)=>{
        const allSkus=[...BASE_PKGS.map(b=>({id:"base_"+b.id,name:b.name+" (Base)",group:"Base"})),...ADDON_CATALOG.map(a=>({id:"addon_"+a.id,name:a.name,group:"Add-On"}))];
        const toggleSku=(skuId)=>{
          setCard(prev=>{const rules=[...(prev.discountRules||[])];const r={...rules[ri]};
            const s=[...(r.skus||[])];const idx=s.indexOf(skuId);
            if(idx>=0)s.splice(idx,1);else s.push(skuId);
            r.skus=s;rules[ri]=r;return{...prev,discountRules:rules};});
        };
        const updateRule=(field,val)=>{
          setCard(prev=>{const rules=[...(prev.discountRules||[])];rules[ri]={...rules[ri],[field]:val};return{...prev,discountRules:rules};});
        };
        const removeRule=()=>{
          setCard(prev=>{const rules=[...(prev.discountRules||[])];rules.splice(ri,1);return{...prev,discountRules:rules};});
        };
        const isAllSelected=(rule.skus||[]).length===allSkus.length;
        const toggleAll=()=>{
          if(isAllSelected){updateRule("skus",[]);}
          else{updateRule("skus",allSkus.map(s=>s.id));}
        };
        return <div key={rule.id||ri} style={{padding:"14px 20px",borderTop:ri>0?"1px solid #E2E8F0":"none"}}>
          <div style={{display:"flex",gap:12,alignItems:"flex-start",flexWrap:"wrap",marginBottom:10}}>
            <div style={{flex:1,minWidth:160}}>
              <div style={{fontSize:9,fontWeight:600,color:C.mid,marginBottom:3}}>RULE NAME</div>
              <input type="text" className="inp" value={rule.name||""} onChange={e=>updateRule("name",e.target.value)}
                placeholder="e.g. Multi-year discount" style={{width:"100%",fontSize:12}}/>
            </div>
            <div style={{minWidth:80}}>
              <div style={{fontSize:9,fontWeight:600,color:C.mid,marginBottom:3}}>DISCOUNT %</div>
              <input type="number" className="inp" min="0" max="100" value={rule.discPct||""} onChange={e=>updateRule("discPct",e.target.value)}
                placeholder="10" style={{width:70,textAlign:"center",fontSize:12}}/>
            </div>
            <div style={{minWidth:130}}>
              <div style={{fontSize:9,fontWeight:600,color:C.mid,marginBottom:3}}>APPLIES WHEN TERM IS</div>
              <select className="inp" value={rule.termMonths||"any"} onChange={e=>updateRule("termMonths",e.target.value)} style={{fontSize:12}}>
                <option value="any">Any term</option>
                <option value="12">12+ months</option>
                <option value="24">24+ months</option>
                <option value="36">36+ months</option>
              </select>
            </div>
            <button onClick={removeRule} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#B0BACA",lineHeight:1,marginTop:16}} title="Remove rule">x</button>
          </div>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{fontSize:9,fontWeight:600,color:C.mid}}>APPLIES TO SKUS</div>
              <button onClick={toggleAll} style={{background:"none",border:"1px dashed #D9DEE6",borderRadius:4,cursor:"pointer",fontSize:10,color:C.mid,padding:"1px 6px"}}>
                {isAllSelected?"Deselect all":"Select all"}
              </button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {allSkus.map(sku=>{
                const on=(rule.skus||[]).includes(sku.id);
                return <label key={sku.id} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:on?C.navy:C.mid,
                  background:on?C.greenTint:"#fff",border:"1px solid "+(on?C.green:"#E2E8F0"),borderRadius:5,padding:"3px 8px",cursor:"pointer",whiteSpace:"nowrap"}}>
                  <input type="checkbox" checked={on} onChange={()=>toggleSku(sku.id)} style={{margin:0}}/>
                  {sku.name}
                </label>;
              })}
            </div>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

function RateCardMode({initialRateCard,onDone}){
  const [cards,setCards]=useState([]);
  const [loading,setLoading]=useState(true);
  const [editingId,setEditingId]=useState(initialRateCard?initialRateCard.id:null);
  const [card,setCard]=useState(null);
  const [rcName,setRcName]=useState("");
  const [rcCustomer,setRcCustomer]=useState("");
  const [rcOwner,setRcOwner]=useState("");
  const [saving,setSaving]=useState(false);
  const [savedMsg,setSavedMsg]=useState(false);

  const buildDefault=()=>{
    const c={basePkgs:{},addons:{},nonAcv:{}};
    BASE_PKGS.forEach(b=>{c.basePkgs[b.id]={price:b.list};});
    ADDON_CATALOG.forEach(a=>{c.addons[a.id]={tiers:a.tiers.map(t=>({label:t.l,listPrice:t.p,myPrice:t.p})),volumeDisc:[]};});
    NONAVC_CATALOG.forEach(n=>{c.nonAcv[n.id]={price:n.list};});
    return c;
  };

  const loadList=()=>{
    fetch("/api/ratecards").then(r=>r.json()).then(d=>{setCards(d.data||[]);setLoading(false);}).catch(()=>setLoading(false));
  };
  useEffect(()=>{
    loadList();
    if(initialRateCard&&initialRateCard.id){doEdit(initialRateCard);}
  },[]);

  const doNew=()=>{setEditingId("new");setCard(buildDefault());setRcName("");setRcCustomer("");setRcOwner("");};

  const doEdit=(rc)=>{
    setEditingId(rc.id);
    fetch("/api/ratecards/"+rc.id).then(r=>r.json()).then(d=>{
      const cd=d.data.card_data||buildDefault();
      /* Ensure all catalog items exist in loaded card */
      ADDON_CATALOG.forEach(a=>{if(!cd.addons[a.id])cd.addons[a.id]={tiers:a.tiers.map(t=>({label:t.l,listPrice:t.p,myPrice:t.p})),volumeDisc:[]};});
      BASE_PKGS.forEach(b=>{if(!cd.basePkgs[b.id])cd.basePkgs[b.id]={price:b.list};});
      NONAVC_CATALOG.forEach(n=>{if(!cd.nonAcv[n.id])cd.nonAcv[n.id]={price:n.list};});
      setCard(cd);
      setRcName(d.data.name||"");setRcCustomer(d.data.customer||"");setRcOwner(d.data.owner||"");
    });
  };

  const doSave=async()=>{
    setSaving(true);
    try{
      const body={name:rcName||"Untitled Rate Card",customer:rcCustomer,owner:rcOwner,card_data:card};
      if(editingId==="new"){
        const r=await fetch("/api/ratecards",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
        if(!r.ok){const err=await r.text();throw new Error("Server error "+r.status+": "+err);}
        const d=await r.json();
        if(!d.ok||!d.data){throw new Error(d.error||"Failed to create rate card — check if the rate_cards table exists in Supabase");}
        setEditingId(d.data.id);
      }else{
        const r=await fetch("/api/ratecards/"+editingId,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
        if(!r.ok){const err=await r.text();throw new Error("Server error "+r.status+": "+err);}
      }
      setSavedMsg(true);setTimeout(()=>setSavedMsg(false),3000);
      loadList();
    }catch(e){alert("Save failed: "+e.message);}
    setSaving(false);
  };

  const doBack=()=>{if(onDone){onDone();}else{setEditingId(null);setCard(null);loadList();}};

  if(loading)return <div style={{textAlign:"center",padding:60,color:C.mid}}>Loading...</div>;

  /* Editor view */
  if(editingId)return <RateCardEditor card={card} setCard={setCard} rcName={rcName} setRcName={setRcName}
    rcCustomer={rcCustomer} setRcCustomer={setRcCustomer} rcOwner={rcOwner} setRcOwner={setRcOwner}
    onSave={doSave} saving={saving} savedMsg={savedMsg} onBack={doBack}/>;

  /* List view */
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
      <div>
        <h2 style={{fontSize:24,fontWeight:800,color:C.navy,marginBottom:4}}>Rate Cards</h2>
        <p style={{fontSize:13,color:C.mid}}>Create customer-specific rate cards. Proposals auto-pull pricing from the selected rate card.</p>
      </div>
      <button className="btn btn-pri" onClick={doNew} style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:18,lineHeight:1}}>+</span> New Rate Card</button>
    </div>
    {cards.length===0&&<div className="card" style={{padding:"40px 20px",textAlign:"center"}}>
      <div style={{fontSize:14,color:C.mid,marginBottom:12}}>No rate cards yet</div>
      <button className="btn btn-sec" onClick={doNew}>Create Your First Rate Card</button>
    </div>}
    {cards.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
      {cards.map(rc=><div key={rc.id} className="card card-hover" onClick={()=>doEdit(rc)} style={{padding:"16px 20px",cursor:"pointer"}}>
        <div style={{fontWeight:700,fontSize:15,color:C.navy,marginBottom:4}}>{rc.name||"Untitled"}</div>
        {rc.customer&&<div style={{fontSize:12,color:C.blue,fontWeight:600,marginBottom:2}}>{rc.customer}</div>}
        {rc.owner&&<div style={{fontSize:11,color:C.mid}}>Owner: {rc.owner}</div>}
        <div style={{fontSize:10,color:C.mid,marginTop:6}}>{rc.updated_at?new Date(rc.updated_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):""}</div>
      </div>)}
    </div>}
  </div>;
}


/* ================================================================
   MAIN APP WITH MODE SWITCH + LOGIN GATE
   ================================================================ */
function App(){
  const [authed,setAuthed]=useState(()=>!!sessionStorage.getItem("g2auth"));
  const [mode,setMode]=useState("proposals");
  const [pendingLoad,setPendingLoad]=useState(null);
  const [pendingRateCard,setPendingRateCard]=useState(null);

  if(!authed)return <LoginGate onAuth={()=>setAuthed(true)}/>;

  const goEdit=(p)=>{setPendingLoad({proposal:p,sub:"products"});setMode("builder");};
  const goView=(p)=>{setPendingLoad({proposal:p,sub:"preview"});setMode("builder");};
  const goNew=()=>{setPendingLoad(null);setMode("builder");};
  const goEditRateCard=(rc)=>{setPendingRateCard(rc);setMode("ratecard");};
  const goNewRateCard=()=>{setPendingRateCard(null);setMode("ratecard");};
  const goLoadVersion=(p,vid)=>{setPendingLoad({proposal:p,sub:"preview",versionId:vid});setMode("builder");};

  return <div style={{minHeight:"100vh",background:C.light}}>
    <div style={{background:C.navy,padding:"20px 0 20px"}} className="no-print">
      <div className="ctr">
        <div style={{borderTop:`3px solid ${C.rorange}`,marginBottom:16}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <img src="/assets/G2Logo-Inverse.png" alt="G2" style={{height:36}}/>
            <div>
              <h1 style={{color:"#fff",fontSize:22,fontWeight:700}}>Proposal Builder</h1>
              <p style={{color:C.green,fontSize:11,marginTop:2,fontWeight:500}}>FY27 Enterprise Offerings | Internal Only</p>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div className="mode-bar">
              <button className={`mode-btn ${mode==="proposals"?"on":""}`} onClick={()=>setMode("proposals")}>Proposals + Rate Cards</button>
              <button className={`mode-btn ${mode==="builder"?"on":""}`} onClick={goNew}>+ New Proposal</button>
              <button className={`mode-btn ${mode==="ratecard"?"on":""}`} onClick={()=>setMode("ratecard")}>+ New Rate Card</button>
              <button className={`mode-btn ${mode==="suite"?"on":""}`} onClick={()=>setMode("suite")}>Product Reference</button>
            </div>
            <button className="btn btn-ghost btn-sm" onClick={()=>{sessionStorage.removeItem("g2auth");setAuthed(false);}}>Sign Out</button>
          </div>
        </div>
      </div>
    </div>
    <div className="ctr" style={{paddingTop:28,paddingBottom:48}}>
      {mode==="proposals"&&<ProposalsLibrary onEdit={goEdit} onView={goView} onNew={goNew} onEditRateCard={goEditRateCard} onNewRateCard={goNewRateCard} onLoadVersion={goLoadVersion}/>}
      {mode==="ratecard"&&<RateCardMode initialRateCard={pendingRateCard} onDone={()=>{setPendingRateCard(null);setMode("proposals");}}/>}
      {mode==="suite"&&<SuiteMode/>}
      {mode==="builder"&&<BuilderMode pendingLoad={pendingLoad} onLoaded={()=>setPendingLoad(null)}/>}
    </div>
    <div style={{background:C.navy,padding:"10px 0"}}><div className="ctr" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <img src="/assets/G2Logo-Inverse.png" alt="G2" style={{height:16,opacity:0.6}}/>
        <span style={{color:"#7D8FA6",fontSize:10}}>Proposal Builder | FY27</span>
      </div>
      <span style={{color:"#7D8FA6",fontSize:10}}>g2.com | Internal Only</span>
    </div></div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
